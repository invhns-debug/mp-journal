<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MP Journal — ES Futures</title>
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0E13;color:#E2EAF0;font-family:'DM Sans',sans-serif}
input,select,textarea{background:#162032;border:1px solid #1E2D3D;color:#E2EAF0;border-radius:6px;padding:8px 12px;font-size:13px;width:100%;font-family:'DM Sans',sans-serif;outline:none}
input:focus,select:focus,textarea:focus{border-color:#00896F}
select option{background:#111820}
textarea{resize:vertical;min-height:72px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#0A0E13}
::-webkit-scrollbar-thumb{background:#1E2D3D;border-radius:2px}
button{transition:all 0.15s}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;

const OPEN_TYPES=["Open Drive Up","Open Drive Down","Open Test Drive Up (Outside)","Open Test Drive Up (Inside)","Open Test Drive Down (Outside)","Open Test Drive Down (Inside)","ORR Up","ORR Down","Open Auction Out of Range","Open Auction In Range"];
const DAY_TYPES=["Trend Day Up","Trend Day Down","Neutral Day","Neutral Extreme","NVD Up","NVD Down","Normal Day","Non-Trend Day","b-Profile","p-Profile","Double Distribution","Unfinished Neutral"];
const OPEN_LOCS=["Inside Range","Outside Range Up","Outside Range Down","Inside VA","Near VAH","Near VAL"];
const IB_BREAKS=["Upside","Downside","Both Sides","None — Normal Day"];
const VWAP_LOCS=["Above VWAP","Below VWAP","At VWAP","At IBH","At IBL"];
const VIX_OPTS=["Below 20 — normal rules","Above 20 — high VIX rules"];
const PLAYBOOK=["Yes — fully followed","Partial — some rules broken","No — ignored rules"];

const RED_DAY_FACTORS=[
  "Proximity trigger fired — near payout or MLL",
  "Traded without SL before entry",
  "Post-6pm destruction sequence",
  "Sized up on high conviction without SL",
  "Globex loss carrying into RTH bias",
  "VPOC/VWAP anchoring on initiative move",
  "Below avg volume — wrong trade type",
  "Proximity trigger — account near MLL",
];

const RULES_FOLLOWED=[
  "SL set in QT before entry",
  "Closed QT at 6pm (VIX<20) or 7pm (VIX>20)",
  "Skipped Globex on VIX>20",
  "Not traded during IB",
  "Not traded 8–9pm",
  "Took 30min break after loss >$500",
  "Took 30min break after big win",
  "Exited 3–4pts before pink/blue line on low volume",
  "Walked away from screen after low volume entry",
  "Stopped at $250 target on funded",
];

const RULES_BROKEN=[
  "No SL before entry",
  "Traded Globex on VIX>20",
  "Traded after 6pm (VIX<20) or 7pm (VIX>20)",
  "Traded 8–9pm",
  "Traded during IB",
  "Used high size (>4 micros on single account)",
  "Added size during consolidation",
  "Held through proximity trigger",
  "Shorted on below avg volume day",
  "Ignored volume filter",
  "Exited profitable position early",
  "Revenge traded after loss",
  "Held for pink/blue line on low volume — should exit 3-4pts before",
];

const EMPTY={
  date:new Date().toISOString().split("T")[0],
  vix:"",
  volumePass:null,
  openLocation:"",
  ibSize:"",
  ibh:"",
  ibl:"",
  vwap:"",
  openType:"",
  ibBreak:"",
  vwapLocation:"",
  dayTypeActual:"",
  playbookFollowed:"",
  redDayFactors:[],
  rulesBroken:[],
  rulesFollowed:[],
  auditNotes:"",
  pnlLondon:"",
  pnlRTH:"",
  pnlEval:"",
  pnlFunded:"",
  maxContracts:"",
  evalAccounts:"",
  fundedAccounts:"",
  trades:"",
  notes:""
};

const C={teal:"#00C9A7",tealDim:"#00896F",red:"#FF4D4D",amber:"#F5A623",green:"#4CAF50",bg:"#0A0E13",card:"#111820",border:"#1E2D3D",text:"#E2EAF0",muted:"#5A7080",accent:"#162032"};

const Tag=({children,color=C.teal})=><span style={{background:color+"18",color,border:`1px solid ${color}40`,borderRadius:4,padding:"2px 8px",fontSize:11,fontFamily:"JetBrains Mono",fontWeight:500,whiteSpace:"nowrap"}}>{children}</span>;
const Card=({children,style={}})=><div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"16px 20px",...style}}>{children}</div>;
const Lbl=({children})=><div style={{fontSize:11,color:C.muted,fontFamily:"JetBrains Mono",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>{children}</div>;
const Sec=({title,children,accent=C.teal})=><div style={{marginBottom:24}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><div style={{width:3,height:16,background:accent,borderRadius:2}}/><span style={{fontSize:12,fontFamily:"JetBrains Mono",color:accent,fontWeight:700,letterSpacing:"0.08em"}}>{title}</span></div>{children}</div>;
const Row=({children})=><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>{children}</div>;
const Col=({children})=><div>{children}</div>;

function Toggle({value,onChange,options}){
  return <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{options.map(o=>{const a=value===o.value,c=o.color||C.teal;return <button key={o.value} onClick={()=>onChange(o.value)} style={{background:a?c+"25":"transparent",border:`1px solid ${a?c:C.border}`,color:a?c:C.muted,borderRadius:6,padding:"6px 14px",fontSize:12,cursor:"pointer",fontFamily:"DM Sans",fontWeight:a?600:400}}>{o.label}</button>;})}</div>;
}

function Checks({options,selected,onChange,color=C.teal}){
  const tog=v=>onChange(selected.includes(v)?selected.filter(x=>x!==v):[...selected,v]);
  return <div style={{display:"flex",flexDirection:"column",gap:6}}>{options.map(o=>{const on=selected.includes(o);return(<label key={o} style={{display:"flex",alignItems:"flex-start",gap:10,cursor:"pointer"}}><div onClick={()=>tog(o)} style={{width:16,height:16,minWidth:16,borderRadius:4,marginTop:2,border:`1px solid ${on?color:C.border}`,background:on?color+"30":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{on&&<div style={{width:8,height:8,background:color,borderRadius:2}}/>}</div><span style={{fontSize:13,color:on?C.text:C.muted,lineHeight:1.4}}>{o}</span></label>);})}</div>;
}

function GuideView({onStart}){
  const steps=[
    {time:"Before open",color:C.teal,icon:"ti-clock",title:"VIX + Volume check first",body:"VIX above or below 20? Volume above 20-day RV? These two determine everything. VIX>20 = open QT at 4:30pm only, skip Globex. Volume below avg = §30 long bias only."},
    {time:"3:00–3:30pm",color:C.amber,icon:"ti-eye",title:"Observe IB forming",body:"Watch open location vs yesterday's range. IB is still forming. Do NOT classify open type yet."},
    {time:"3:30pm",color:C.teal,icon:"ti-flag",title:"IB closes — open type confirmed",body:"Classify open type. Note IB size, IBH, IBL, VWAP. Send template to Claude for 6-point guide."},
    {time:"During session",color:C.amber,icon:"ti-trending-up",title:"Trade — SL before every entry",body:"SL in QT before any trade. No exceptions. Follow rules. Keep mental note of any rule broken."},
    {time:"End of day",color:C.green,icon:"ti-pencil",title:"Log the full session",body:"Fill all sections honestly. The audit notes are the most valuable field — write what you were thinking and feeling."},
    {time:"Friday",color:C.teal,icon:"ti-download",title:"Export JSON backup",body:"Click Export every Friday. Save to Google Drive. localStorage can be wiped. The export is the only insurance."},
  ];
  return <div style={{maxWidth:680}}>
    <div style={{marginBottom:28}}>
      <div style={{fontFamily:"JetBrains Mono",fontSize:18,color:C.teal,fontWeight:700,marginBottom:8}}>Market Profile Journal</div>
      <div style={{fontSize:13,color:C.muted,lineHeight:1.7}}>Built from the playbook. Every field maps to a specific rule. The audit notes field is where the real learning happens — write honestly.</div>
    </div>
    <div style={{marginBottom:28}}>{steps.map((s,i)=><div key={i} style={{display:"flex",gap:16,marginBottom:16}}>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
        <div style={{width:36,height:36,borderRadius:"50%",background:s.color+"20",border:`1px solid ${s.color}40`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><i className={`ti ${s.icon}`} style={{fontSize:16,color:s.color}}/></div>
        {i<steps.length-1&&<div style={{width:1,flex:1,background:C.border,marginTop:6}}/>}
      </div>
      <div style={{paddingBottom:16}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:5}}><span style={{fontFamily:"JetBrains Mono",fontSize:11,color:s.color}}>{s.time}</span><span style={{fontSize:13,fontWeight:600,color:C.text}}>{s.title}</span></div>
        <div style={{fontSize:12,color:C.muted,lineHeight:1.6}}>{s.body}</div>
      </div>
    </div>)}</div>
    <Card style={{background:C.red+"08",border:`1px solid ${C.red}25`,marginBottom:24}}>
      <div style={{fontSize:11,color:C.red,fontFamily:"JetBrains Mono",marginBottom:10,letterSpacing:"0.06em"}}>TWO RULES — EVERYTHING ELSE IS REFINEMENT</div>
      <div style={{fontSize:13,color:C.text,lineHeight:1.7}}><span style={{color:C.red,fontWeight:600}}>① SL in QT before any trade.</span> No SL = no trade. No exceptions. No conviction overrides this.<br/><span style={{color:C.red,fontWeight:600}}>② Close at 6pm (VIX&lt;20) or 7pm (VIX&gt;20).</span> Not after one more trade. At the time.</div>
    </Card>
    <button onClick={onStart} style={{width:"100%",padding:"14px 20px",background:C.teal+"20",border:`1px solid ${C.teal}`,borderRadius:8,color:C.teal,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"JetBrains Mono",letterSpacing:"0.06em"}}>LOG TODAY'S SESSION →</button>
  </div>;
}

function NewSessionView({onSave}){
  const [f,setF]=useState({...EMPTY});
  const u=(k,v)=>setF(p=>({...p,[k]:v}));
  const save=()=>{
    if(!f.date||!f.openType){alert("Date and Open Type required.");return;}
    onSave({...f});
    setF({...EMPTY,date:new Date().toISOString().split("T")[0]});
    alert("Session saved!");
  };
  return <div style={{maxWidth:680}}>
    <Sec title="§01 — CONTEXT: VIX + VOLUME">
      <Row>
        <Col><Lbl>VIX Level</Lbl>
          <select value={f.vix} onChange={e=>u("vix",e.target.value)}>
            <option value="">Select VIX...</option>
            {VIX_OPTS.map(o=><option key={o} value={o}>{o}</option>)}
          </select>
        </Col>
        <Col><Lbl>Volume Gate</Lbl>
          <Toggle value={f.volumePass===null?"":f.volumePass?"pass":"fail"} onChange={v=>u("volumePass",v==="pass")} options={[{value:"pass",label:"Above Avg ✅",color:C.green},{value:"fail",label:"Below Avg ⚠️",color:C.amber}]}/>
        </Col>
      </Row>
      {f.volumePass===false&&<div style={{padding:"10px 14px",background:C.amber+"15",border:`1px solid ${C.amber}40`,borderRadius:6,fontSize:12,color:C.amber,marginTop:8}}>⚠️ BELOW AVG VOLUME — Exit 3–4pts before pink/blue/trend line. Target takes 60–90 mins. Walk away from screen after entry.</div>}
      {f.vix&&f.vix.includes("Above")&&<div style={{padding:"10px 14px",background:C.red+"15",border:`1px solid ${C.red}40`,borderRadius:6,fontSize:12,color:C.red,marginTop:8}}>🔴 VIX &gt;20 — Skip Globex. Open QT at 4:30pm only. Close at 7pm.</div>}
    </Sec>

    <Sec title="§02 — OPEN CONTEXT">
      <Row>
        <Col><Lbl>Date</Lbl><input type="date" value={f.date} onChange={e=>u("date",e.target.value)}/></Col>
        <Col><Lbl>Open Location</Lbl>
          <select value={f.openLocation} onChange={e=>u("openLocation",e.target.value)}>
            <option value="">Select...</option>
            {OPEN_LOCS.map(o=><option key={o} value={o}>{o}</option>)}
          </select>
        </Col>
      </Row>
      <Row>
        <Col><Lbl>IB Size (pts)</Lbl><input type="number" placeholder="e.g. 24.75" value={f.ibSize} onChange={e=>u("ibSize",e.target.value)}/></Col>
        <Col><Lbl>IB Break</Lbl>
          <select value={f.ibBreak} onChange={e=>u("ibBreak",e.target.value)}>
            <option value="">Select...</option>
            {IB_BREAKS.map(o=><option key={o} value={o}>{o}</option>)}
          </select>
        </Col>
      </Row>
      <Row>
        <Col><Lbl>IBH</Lbl><input type="number" placeholder="e.g. 7604.25" value={f.ibh} onChange={e=>u("ibh",e.target.value)}/></Col>
        <Col><Lbl>IBL</Lbl><input type="number" placeholder="e.g. 7578.50" value={f.ibl} onChange={e=>u("ibl",e.target.value)}/></Col>
      </Row>
      <Row>
        <Col><Lbl>VWAP</Lbl><input type="number" placeholder="e.g. 7594.00" value={f.vwap} onChange={e=>u("vwap",e.target.value)}/></Col>
        <Col><Lbl>VWAP Location</Lbl>
          <select value={f.vwapLocation} onChange={e=>u("vwapLocation",e.target.value)}>
            <option value="">Select...</option>
            {VWAP_LOCS.map(o=><option key={o} value={o}>{o}</option>)}
          </select>
        </Col>
      </Row>
    </Sec>

    <Sec title="§03 — OPEN TYPE">
      <select value={f.openType} onChange={e=>u("openType",e.target.value)}>
        <option value="">Select open type...</option>
        {OPEN_TYPES.map(o=><option key={o} value={o}>{o}</option>)}
      </select>
    </Sec>

    <Sec title="§04 — DAY TYPE">
      <Lbl>Actual Day Type</Lbl>
      <select value={f.dayTypeActual} onChange={e=>u("dayTypeActual",e.target.value)}>
        <option value="">Select...</option>
        {DAY_TYPES.map(o=><option key={o} value={o}>{o}</option>)}
      </select>
    </Sec>

    <Sec title="§05 — TRADE RESULT">
      <Row>
        <Col><Lbl>London Session P&L ($)</Lbl><input type="number" placeholder="+300 or -150" value={f.pnlLondon} onChange={e=>u("pnlLondon",e.target.value)}/></Col>
        <Col><Lbl>RTH P&L ($)</Lbl><input type="number" placeholder="+850 or -200" value={f.pnlRTH} onChange={e=>u("pnlRTH",e.target.value)}/></Col>
      </Row>
      <Row>
        <Col><Lbl>Eval Account P&L ($)</Lbl><input type="number" placeholder="+1200 or -400" value={f.pnlEval} onChange={e=>u("pnlEval",e.target.value)}/></Col>
        <Col><Lbl>Funded Account P&L ($)</Lbl><input type="number" placeholder="+699 or -744" value={f.pnlFunded} onChange={e=>u("pnlFunded",e.target.value)}/></Col>
      </Row>
      <Row>
        <Col><Lbl>Max Contracts</Lbl><input type="number" placeholder="e.g. 4" value={f.maxContracts} onChange={e=>u("maxContracts",e.target.value)}/></Col>
        <Col><Lbl>Number of Trades</Lbl><input type="number" placeholder="e.g. 5" value={f.trades} onChange={e=>u("trades",e.target.value)}/></Col>
      </Row>
      <Row>
        <Col><Lbl>Eval Accounts</Lbl><input type="number" placeholder="0" value={f.evalAccounts} onChange={e=>u("evalAccounts",e.target.value)}/></Col>
        <Col><Lbl>Funded Accounts</Lbl><input type="number" placeholder="1" value={f.fundedAccounts} onChange={e=>u("fundedAccounts",e.target.value)}/></Col>
      </Row>
      <div style={{marginBottom:12}}><Lbl>Playbook Followed</Lbl>
        <Toggle value={f.playbookFollowed} onChange={v=>u("playbookFollowed",v)} options={[{value:PLAYBOOK[0],label:"Fully ✅",color:C.green},{value:PLAYBOOK[1],label:"Partial ⚠️",color:C.amber},{value:PLAYBOOK[2],label:"Ignored 🔴",color:C.red}]}/>
      </div>
    </Sec>

    <Sec title="§06 — SELF AUDIT" accent={C.amber}>
      <div style={{marginBottom:16}}>
        <Lbl>Rules Followed ✅</Lbl>
        <Checks options={RULES_FOLLOWED} selected={f.rulesFollowed} onChange={v=>u("rulesFollowed",v)} color={C.green}/>
      </div>
      <div style={{marginBottom:16}}>
        <Lbl>Rules Broken 🔴</Lbl>
        <Checks options={RULES_BROKEN} selected={f.rulesBroken} onChange={v=>u("rulesBroken",v)} color={C.red}/>
      </div>
      <div>
        <Lbl>Red Day Factors ⚠️</Lbl>
        <Checks options={RED_DAY_FACTORS} selected={f.redDayFactors} onChange={v=>u("redDayFactors",v)} color={C.amber}/>
      </div>
    </Sec>

    <Sec title="§07 — AUDIT NOTES + OBSERVATIONS" accent={C.muted}>
      <div style={{marginBottom:12}}>
        <Lbl>Audit Notes — What happened, what triggered, what you were thinking</Lbl>
        <textarea rows={6} placeholder="Write honestly. What fired the trigger? What did you feel when the account went from positive to negative? What rule did you break and why? What would you do differently? What did the market teach you today?" value={f.auditNotes} onChange={e=>u("auditNotes",e.target.value)}/>
      </div>
      <div>
        <Lbl>Session Notes — Key observations and new rules</Lbl>
        <textarea rows={4} placeholder="Open type, day type development, key levels, new patterns identified..." value={f.notes} onChange={e=>u("notes",e.target.value)}/>
      </div>
    </Sec>

    <button onClick={save} style={{width:"100%",padding:"14px 20px",background:C.teal+"20",border:`1px solid ${C.teal}`,borderRadius:8,color:C.teal,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"JetBrains Mono",letterSpacing:"0.06em",marginBottom:40}}>SAVE SESSION →</button>
  </div>;
}

function DashboardView({sessions}){
  const pnlOf=s=>{
    const london=parseFloat(s.pnlLondon)||0;
    const rth=parseFloat(s.pnlRTH)||0;
    if(london||rth)return london+rth;
    const e=(parseFloat(s.pnlEval)||0)*(parseInt(s.evalAccounts)||1);
    const fu=(parseFloat(s.pnlFunded)||0)*(parseInt(s.fundedAccounts)||1);
    return e+fu;
  };
  const total=sessions.length;
  const withP=sessions.filter(s=>pnlOf(s)!==0||s.pnlEval||s.pnlFunded||s.pnlLondon||s.pnlRTH);
  const wins=withP.filter(s=>pnlOf(s)>0).length;
  const wr=withP.length?Math.round((wins/withP.length)*100):0;
  const avgTotal=withP.length?(withP.reduce((a,s)=>a+pnlOf(s),0)/withP.length).toFixed(0):"—";
  const pb0=sessions.filter(s=>s.playbookFollowed===PLAYBOOK[0]);
  const pb2=sessions.filter(s=>s.playbookFollowed===PLAYBOOK[2]);
  const r0=pb0.length?Math.round((pb0.filter(s=>pnlOf(s)>0).length/pb0.length)*100):0;
  const r2=pb2.length?Math.round((pb2.filter(s=>pnlOf(s)>0).length/pb2.length)*100):0;
  const grandTotal=sessions.reduce((a,s)=>a+pnlOf(s),0);
  const byOT={};sessions.forEach(s=>{if(!s.openType)return;if(!byOT[s.openType])byOT[s.openType]={t:0,w:0};byOT[s.openType].t++;if(pnlOf(s)>0)byOT[s.openType].w++;});
  const rdC={};sessions.forEach(s=>(s.redDayFactors||[]).forEach(f=>{rdC[f]=(rdC[f]||0)+1;}));
  const rbC={};sessions.forEach(s=>(s.rulesBroken||[]).forEach(f=>{rbC[f]=(rbC[f]||0)+1;}));
  const rfC={};sessions.forEach(s=>(s.rulesFollowed||[]).forEach(f=>{rfC[f]=(rfC[f]||0)+1;}));
  const topRD=Object.entries(rdC).sort((a,b)=>b[1]-a[1]).slice(0,4);
  const topRB=Object.entries(rbC).sort((a,b)=>b[1]-a[1]).slice(0,4);
  const topRF=Object.entries(rfC).sort((a,b)=>b[1]-a[1]).slice(0,5);
  if(total===0)return <div style={{textAlign:"center",padding:"60px 20px",color:C.muted}}><div style={{fontSize:36,marginBottom:16}}>📋</div><div style={{fontFamily:"JetBrains Mono",fontSize:13}}>No sessions logged yet</div></div>;
  return <div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:10,marginBottom:24}}>
      {[["SESSIONS",total,C.teal],["WIN RATE",`${wr}%`,wr>=60?C.green:wr>=40?C.amber:C.red],["AVG SESSION",avgTotal==="—"?avgTotal:`$${avgTotal}`,parseFloat(avgTotal)>0?C.green:C.red],["TOTAL P&L",grandTotal===0?"—":`${grandTotal>0?"+":""}$${Math.abs(Math.round(grandTotal)).toLocaleString()}`,grandTotal>0?C.green:C.red],["PB FOLLOW",pb0.length?`${r0}%`:"—",C.teal],["PB IGNORE",pb2.length?`${r2}%`:"—",C.red]].map(([l,v,c])=><div key={l} style={{background:C.accent,borderRadius:8,padding:"12px 14px",border:`1px solid ${C.border}`}}><div style={{fontSize:10,color:C.muted,fontFamily:"JetBrains Mono",marginBottom:6}}>{l}</div><div style={{fontSize:20,fontWeight:700,color:c,fontFamily:"JetBrains Mono"}}>{v}</div></div>)}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
      <Card>
        <div style={{fontSize:11,color:C.muted,fontFamily:"JetBrains Mono",marginBottom:12,letterSpacing:"0.06em"}}>WIN RATE BY OPEN TYPE</div>
        {Object.keys(byOT).length===0?<div style={{color:C.muted,fontSize:12}}>No data yet</div>:Object.entries(byOT).sort((a,b)=>b[1].t-a[1].t).map(([type,d])=>{const w=d.t?Math.round((d.w/d.t)*100):0;const sh=type.replace("Open Test Drive","OTD").replace("Open Auction","OA").replace("Open Drive","OD").replace("Outside","Out").replace("Inside","In");return <div key={type} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:11,color:C.text}}>{sh}</span><span style={{fontSize:11,fontFamily:"JetBrains Mono",color:w>=60?C.green:w>=40?C.amber:C.red}}>{w}% · {d.t}x</span></div><div style={{background:C.border,borderRadius:2,height:4,overflow:"hidden"}}><div style={{width:`${w}%`,height:"100%",background:w>=60?C.green:w>=40?C.amber:C.red,borderRadius:2}}/></div></div>;})}
      </Card>
      <Card>
        <div style={{fontSize:11,color:C.muted,fontFamily:"JetBrains Mono",marginBottom:12,letterSpacing:"0.06em"}}>AUDIT SUMMARY</div>
        {topRD.length>0&&<><div style={{fontSize:10,color:C.red,fontFamily:"JetBrains Mono",marginBottom:8,letterSpacing:"0.04em"}}>RED DAY TRIGGERS</div>{topRD.map(([f,n])=><div key={f} style={{display:"flex",justifyContent:"space-between",gap:8,marginBottom:6,padding:"5px 8px",background:C.red+"10",borderRadius:5,border:`1px solid ${C.red}20`}}><span style={{fontSize:11,color:C.text,lineHeight:1.4}}>{f}</span><Tag color={C.red}>{n}x</Tag></div>)}</>}
        {topRB.length>0&&<><div style={{fontSize:10,color:C.amber,fontFamily:"JetBrains Mono",marginBottom:8,marginTop:12,letterSpacing:"0.04em"}}>RULES BROKEN MOST</div>{topRB.map(([f,n])=><div key={f} style={{display:"flex",justifyContent:"space-between",gap:8,marginBottom:6,padding:"5px 8px",background:C.amber+"10",borderRadius:5,border:`1px solid ${C.amber}20`}}><span style={{fontSize:11,color:C.text,lineHeight:1.4}}>{f}</span><Tag color={C.amber}>{n}x</Tag></div>)}</>}
        {topRF.length>0&&<><div style={{fontSize:10,color:C.green,fontFamily:"JetBrains Mono",marginBottom:8,marginTop:12,letterSpacing:"0.04em"}}>RULES CONSISTENTLY FOLLOWED</div>{topRF.map(([f,n])=><div key={f} style={{display:"flex",justifyContent:"space-between",gap:8,marginBottom:6,padding:"5px 8px",background:C.green+"10",borderRadius:5,border:`1px solid ${C.green}20`}}><span style={{fontSize:11,color:C.text,lineHeight:1.4}}>{f}</span><Tag color={C.green}>{n}x</Tag></div>)}</>}
      </Card>
    </div>
    <Card>
      <div style={{fontSize:11,color:C.muted,fontFamily:"JetBrains Mono",marginBottom:12,letterSpacing:"0.06em"}}>PLAYBOOK DISCIPLINE IMPACT</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
        {[[PLAYBOOK[0],"Fully Followed",C.green],[PLAYBOOK[1],"Partial",C.amber],[PLAYBOOK[2],"Ignored",C.red]].map(([pb,label,c])=>{const ss=sessions.filter(s=>s.playbookFollowed===pb);const w=ss.filter(s=>pnlOf(s)>0).length;const wr2=ss.length?Math.round((w/ss.length)*100):0;return <div key={pb} style={{background:C.bg,borderRadius:8,padding:"12px",border:`1px solid ${c}30`}}><div style={{fontSize:10,color:c,fontFamily:"JetBrains Mono",marginBottom:6}}>{label}</div><div style={{fontSize:22,fontWeight:700,color:c,fontFamily:"JetBrains Mono",marginBottom:2}}>{ss.length?`${wr2}%`:"—"}</div><div style={{fontSize:10,color:C.muted}}>{ss.length} sessions</div></div>;})}
      </div>
    </Card>
  </div>;
}

function HistoryView({sessions,onDelete}){
  const pnlOf=s=>{
    const london=parseFloat(s.pnlLondon)||0;
    const rth=parseFloat(s.pnlRTH)||0;
    if(london||rth)return london+rth;
    const e=(parseFloat(s.pnlEval)||0)*(parseInt(s.evalAccounts)||1);
    const fu=(parseFloat(s.pnlFunded)||0)*(parseInt(s.fundedAccounts)||1);
    return e+fu;
  };
  if(sessions.length===0)return <div style={{textAlign:"center",padding:"60px 20px",color:C.muted}}><div style={{fontSize:36,marginBottom:16}}>📋</div><div style={{fontFamily:"JetBrains Mono",fontSize:13}}>No sessions yet</div></div>;
  return <div>{[...sessions].reverse().map(s=>{
    const pnl=pnlOf(s);
    const pos=pnl>0;
    return <Card key={s.id} style={{marginBottom:12,border:`1px solid ${pos?C.green+"40":pnl<0?C.red+"40":C.border}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
            <span style={{fontFamily:"JetBrains Mono",fontSize:13,fontWeight:700,color:C.text}}>{s.date}</span>
            {s.vix&&<Tag color={s.vix.includes("Above")?C.red:C.green}>{s.vix.includes("Above")?"VIX>20":"VIX<20"}</Tag>}
            {s.openType&&<Tag color={C.teal}>{s.openType}</Tag>}
            {s.dayTypeActual&&<Tag color={C.amber}>{s.dayTypeActual}</Tag>}
            {s.volumePass===true&&<Tag color={C.green}>Vol ✅</Tag>}
            {s.volumePass===false&&<Tag color={C.amber}>Vol ⚠️</Tag>}
            {s.playbookFollowed===PLAYBOOK[0]&&<Tag color={C.green}>PB ✅</Tag>}
            {s.playbookFollowed===PLAYBOOK[2]&&<Tag color={C.red}>PB 🔴</Tag>}
          </div>
          <div style={{display:"flex",gap:16,marginBottom:6,flexWrap:"wrap"}}>
            {(s.pnlLondon||s.pnlRTH)&&<span style={{fontSize:11,color:C.muted}}>London: <span style={{color:parseFloat(s.pnlLondon)>0?C.green:parseFloat(s.pnlLondon)<0?C.red:C.muted,fontFamily:"JetBrains Mono"}}>{s.pnlLondon?`$${s.pnlLondon}`:"-"}</span> · RTH: <span style={{color:parseFloat(s.pnlRTH)>0?C.green:parseFloat(s.pnlRTH)<0?C.red:C.muted,fontFamily:"JetBrains Mono"}}>{s.pnlRTH?`$${s.pnlRTH}`:"-"}</span></span>}
            {(s.pnlEval||s.pnlFunded)&&<span style={{fontSize:11,color:C.muted}}>Eval: <span style={{color:parseFloat(s.pnlEval)>0?C.green:parseFloat(s.pnlEval)<0?C.red:C.muted,fontFamily:"JetBrains Mono"}}>{s.pnlEval?`$${s.pnlEval}`:"-"}</span> · Funded: <span style={{color:parseFloat(s.pnlFunded)>0?C.green:parseFloat(s.pnlFunded)<0?C.red:C.muted,fontFamily:"JetBrains Mono"}}>{s.pnlFunded?`$${s.pnlFunded}`:"-"}</span></span>}
          </div>
          {s.ibSize&&<div style={{fontSize:11,color:C.muted,marginBottom:4}}>IB: {s.ibSize}pts {s.ibh&&`· IBH ${s.ibh}`} {s.ibl&&`· IBL ${s.ibl}`} {s.vwap&&`· VWAP ${s.vwap}`} {s.ibBreak&&`· Break: ${s.ibBreak}`}</div>}
          {(s.rulesFollowed||[]).length>0&&<div style={{fontSize:10,color:C.green,marginBottom:3}}>✅ {s.rulesFollowed.join(" · ")}</div>}
          {(s.rulesBroken||[]).length>0&&<div style={{fontSize:10,color:C.red,marginBottom:3}}>🔴 {s.rulesBroken.join(" · ")}</div>}
          {(s.redDayFactors||[]).length>0&&<div style={{fontSize:10,color:C.amber,marginBottom:3}}>⚠️ {s.redDayFactors.join(" · ")}</div>}
          {s.auditNotes&&<div style={{marginTop:8,fontSize:11,color:C.muted,lineHeight:1.5,fontStyle:"italic",background:C.bg,padding:"8px 10px",borderRadius:6,border:`1px solid ${C.border}`}}>{s.auditNotes}</div>}
          {s.notes&&!s.auditNotes&&<div style={{marginTop:6,fontSize:11,color:C.muted,lineHeight:1.5}}>{s.notes}</div>}
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,flexShrink:0}}>
          <div style={{fontFamily:"JetBrains Mono",fontSize:20,fontWeight:700,color:pos?C.green:pnl<0?C.red:C.muted}}>{pnl===0?"—":`${pos?"+":""}$${Math.abs(Math.round(pnl)).toLocaleString()}`}</div>
          {s.trades&&<div style={{fontSize:10,color:C.muted}}>{s.trades} trades</div>}
          {s.maxContracts&&<div style={{fontSize:10,color:C.muted}}>max {s.maxContracts}ct</div>}
          <button onClick={()=>{if(confirm("Delete this session?"))onDelete(s.id);}} style={{marginTop:4,background:"transparent",border:`1px solid ${C.border}`,borderRadius:4,padding:"3px 8px",color:C.muted,cursor:"pointer",fontSize:10}}>del</button>
        </div>
      </div>
    </Card>;
  })}</div>;
}

function App(){
  const [tab,setTab]=useState("guide");
  const [sessions,setSessions]=useState([]);
  const [imported,setImported]=useState(false);

  useEffect(()=>{
    try{const r=localStorage.getItem("mp_sessions");if(r)setSessions(JSON.parse(r));}catch(_){}
  },[]);

  const persist=u=>{try{localStorage.setItem("mp_sessions",JSON.stringify(u));}catch(_){}setSessions(u);};
  const add=s=>persist([...sessions,{...s,id:Date.now().toString()}]);
  const del=id=>persist(sessions.filter(s=>s.id!==id));

  const exportData=()=>{
    const data={exported:new Date().toISOString(),sessions,version:"2.0"};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download=`mp-journal-${new Date().toISOString().split("T")[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importData=e=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        const imp=data.sessions||data;
        if(Array.isArray(imp)){
          persist(imp);
          setImported(true);
          setTimeout(()=>setImported(false),2500);
        }
      }catch(_){alert("Invalid file — please use an exported MP Journal JSON file.");}
    };
    reader.readAsText(file);
    e.target.value="";
  };

  const tabs=[{id:"guide",label:"Guide",icon:"ti-info-circle"},{id:"new",label:"Log Session",icon:"ti-plus"},{id:"dashboard",label:"Dashboard",icon:"ti-chart-bar"},{id:"history",label:"History",icon:"ti-history"}];

  return <>
    <div style={{background:"#111820",borderBottom:"1px solid #1E2D3D",padding:"0 20px",position:"sticky",top:0,zIndex:10}}>
      <div style={{maxWidth:720,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{padding:"14px 0",display:"flex",alignItems:"baseline",gap:10}}>
          <span style={{fontFamily:"JetBrains Mono",fontWeight:700,fontSize:14,color:"#00C9A7",letterSpacing:"0.04em"}}>MP JOURNAL</span>
          <span style={{fontSize:10,color:"#5A7080",fontFamily:"JetBrains Mono"}}>ES FUTURES · v2.0</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:2}}>
          {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{background:tab===t.id?"#00C9A715":"transparent",border:"none",borderBottom:`2px solid ${tab===t.id?"#00C9A7":"transparent"}`,color:tab===t.id?"#00C9A7":"#5A7080",padding:"16px 12px 14px",fontSize:12,cursor:"pointer",fontFamily:"DM Sans",fontWeight:tab===t.id?600:400,display:"flex",alignItems:"center",gap:6}}><i className={`ti ${t.icon}`} style={{fontSize:14}}/>{t.label}</button>)}
          <div style={{width:1,height:24,background:"#1E2D3D",margin:"0 8px"}}/>
          <button onClick={exportData} title="Download journal backup" style={{background:"transparent",border:"1px solid #1E2D3D",borderRadius:6,color:"#5A7080",padding:"6px 10px",fontSize:11,cursor:"pointer",fontFamily:"JetBrains Mono",display:"flex",alignItems:"center",gap:5}}><i className="ti ti-upload" style={{fontSize:13}}/>Export</button>
          <label title="Import from backup file" style={{background:"transparent",border:"1px solid #1E2D3D",borderRadius:6,color:imported?"#4CAF50":"#5A7080",padding:"6px 10px",fontSize:11,cursor:"pointer",fontFamily:"JetBrains Mono",display:"flex",alignItems:"center",gap:5}}>
            <i className={`ti ${imported?"ti-check":"ti-download"}`} style={{fontSize:13}}/>{imported?"Imported!":"Import"}
            <input type="file" accept=".json" onChange={importData} style={{display:"none"}}/>
          </label>
        </div>
      </div>
    </div>
    <div style={{maxWidth:720,margin:"0 auto",padding:"24px 20px"}}>
      {tab==="guide"?<GuideView onStart={()=>setTab("new")}/>:tab==="new"?<NewSessionView onSave={add}/>:tab==="dashboard"?<DashboardView sessions={sessions}/>:<HistoryView sessions={sessions} onDelete={del}/>}
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
